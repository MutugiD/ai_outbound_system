# ============================================================
# AI Outbound OS — CD Pipeline (Deploy to Production)
# ============================================================
# Triggered on version tags (v*) or manual dispatch.
# Builds Docker images, pushes to GHCR, deploys via SSH.
# ============================================================

name: Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
      image_tag:
        description: "Image tag to deploy (e.g. v1.2.3). For rollback, pick an older tag."
        required: true
        default: "v0.1.0"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/outbound-backend
  FRONTEND_IMAGE: ${{ github.repository }}/outbound-frontend

jobs:
  # ----------------------------------------------------------
  # Run full CI before deploying
  # ----------------------------------------------------------
  ci:
    name: CI Check
    if: github.ref_type == 'tag'
    uses: ./.github/workflows/ci.yml

  # ----------------------------------------------------------
  # Build & Push Docker Images
  # ----------------------------------------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref_type == 'tag'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}
          build-args: |
            VITE_API_URL=/api
            VITE_APP_VERSION=${{ github.ref_name }}
            VITE_GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------
  # Deploy to Server
  # ----------------------------------------------------------
  deploy:
    name: Deploy to ${{ inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_type == 'tag'
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/ai-outbound-os
            export BACKEND_IMAGE=ghcr.io/${{ env.BACKEND_IMAGE }}
            export FRONTEND_IMAGE=ghcr.io/${{ env.FRONTEND_IMAGE }}
            export IMAGE_TAG=${{ github.ref_name }}
            docker compose --profile prod pull
            docker compose --profile prod up -d --remove-orphans
            sleep 5
            curl -f http://localhost:8000/health || exit 1
            echo "Deployed ${{ github.ref_name }} successfully"

  deploy-existing:
    name: Deploy existing tag (${{ inputs.image_tag }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/ai-outbound-os
            export BACKEND_IMAGE=ghcr.io/${{ env.BACKEND_IMAGE }}
            export FRONTEND_IMAGE=ghcr.io/${{ env.FRONTEND_IMAGE }}
            export IMAGE_TAG=${{ inputs.image_tag }}
            docker compose --profile prod pull
            docker compose --profile prod up -d --remove-orphans
            sleep 5
            curl -f http://localhost:8000/health || exit 1
            echo "Deployed ${{ inputs.image_tag }} successfully"
