services:
  api-dev:
    profiles:
    - dev
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
    - 8000:8000
    environment:
    - DATABASE_URL=postgresql+asyncpg://outbound:outbound@db:5432/outbound_os
    - DATABASE_URL_SYNC=postgresql://outbound:outbound@db:5432/outbound_os
    - REDIS_URL=redis://redis:6379/0
    - CELERY_BROKER_URL=redis://redis:6379/0
    - CELERY_RESULT_BACKEND=redis://redis:6379/1
    - SECRET_KEY=dev-secret-key-change-in-production
    - S3_ENDPOINT_URL=http://minio:9000
    - S3_ACCESS_KEY=minio
    - S3_SECRET_KEY=minio123
    - S3_BUCKET=outbound-os
    - DEBUG=true
    - EVOLUTION_API_URL=http://evolution-api:8080
    - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-outbound-os-evolution-key}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
    - ./backend:/app
