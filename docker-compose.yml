services:
  # ── API Server ──────────────────────────────────────────────────────
  api-dev:
    profiles: ["dev"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://outbound:outbound@db:5432/outbound_os
      - DATABASE_URL_SYNC=postgresql://outbound:outbound@db:5432/outbound_os
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=dev-secret-key-change-in-production
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=minio
      - S3_SECRET_KEY=minio123
      - S3_BUCKET=outbound-os
      - DEBUG=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app

  worker-dev:
    profiles: ["dev"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker -l info -Q scraping,enrichment,ai,outreach,inbox,marketing,default -c 4
    environment:
      - DATABASE_URL=postgresql+asyncpg://outbound:outbound@db:5432/outbound_os
      - DATABASE_URL_SYNC=postgresql://outbound:outbound@db:5432/outbound_os
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=dev-secret-key-change-in-production
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=minio
      - S3_SECRET_KEY=minio123
      - S3_BUCKET=outbound-os
      - DEBUG=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app

  scheduler-dev:
    profiles: ["dev"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app beat -l info
    environment:
      - DATABASE_URL=postgresql+asyncpg://outbound:outbound@db:5432/outbound_os
      - DATABASE_URL_SYNC=postgresql://outbound:outbound@db:5432/outbound_os
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=dev-secret-key-change-in-production
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=minio
      - S3_SECRET_KEY=minio123
      - S3_BUCKET=outbound-os
      - DEBUG=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app

  api:
    profiles: ["prod"]
    image: ${BACKEND_IMAGE:-outbound-backend}:${IMAGE_TAG:-latest}
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://outbound:outbound@db:5432/outbound_os
      - DATABASE_URL_SYNC=postgresql://outbound:outbound@db:5432/outbound_os
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minio}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minio123}
      - S3_BUCKET=${S3_BUCKET:-outbound-os}
      - DEBUG=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    profiles: ["prod"]
    image: ${BACKEND_IMAGE:-outbound-backend}:${IMAGE_TAG:-latest}
    command: celery -A app.workers.celery_app worker -l info -Q scraping,enrichment,ai,outreach,inbox,marketing,default -c 4
    environment:
      - DATABASE_URL=postgresql+asyncpg://outbound:outbound@db:5432/outbound_os
      - DATABASE_URL_SYNC=postgresql://outbound:outbound@db:5432/outbound_os
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minio}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minio123}
      - S3_BUCKET=${S3_BUCKET:-outbound-os}
      - DEBUG=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    profiles: ["prod"]
    image: ${BACKEND_IMAGE:-outbound-backend}:${IMAGE_TAG:-latest}
    command: celery -A app.workers.celery_app beat -l info
    environment:
      - DATABASE_URL=postgresql+asyncpg://outbound:outbound@db:5432/outbound_os
      - DATABASE_URL_SYNC=postgresql://outbound:outbound@db:5432/outbound_os
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minio}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minio123}
      - S3_BUCKET=${S3_BUCKET:-outbound-os}
      - DEBUG=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    profiles: ["prod"]
    image: ${FRONTEND_IMAGE:-outbound-frontend}:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
    depends_on:
      - api

  # ── PostgreSQL + pgvector ──────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=outbound_os
      - POSTGRES_USER=outbound
      - POSTGRES_PASSWORD=outbound
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outbound -d outbound_os"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # ── MinIO (S3-compatible object storage) ────────────────────────────
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"

volumes:
  pgdata:
  redisdata:
  miniodata:
