      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
    - ./backend:/app
  api:
    profiles:
    - prod
    image: ${BACKEND_IMAGE:-outbound-backend}:${IMAGE_TAG:-latest}
    ports:
    - 8000:8000
    environment:
    - DATABASE_URL=postgresql+asyncpg://outbound:outbound@db:5432/outbound_os
    - DATABASE_URL_SYNC=postgresql://outbound:outbound@db:5432/outbound_os
    - REDIS_URL=redis://redis:6379/0
    - CELERY_BROKER_URL=redis://redis:6379/0
    - CELERY_RESULT_BACKEND=redis://redis:6379/1
    - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
    - S3_ENDPOINT_URL=http://minio:9000
    - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minio}
    - S3_SECRET_KEY=${S3_SECRET_KEY:-minio123}
    - S3_BUCKET=${S3_BUCKET:-outbound-os}
    - DEBUG=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
  worker:
    profiles:
    - prod
    image: ${BACKEND_IMAGE:-outbound-backend}:${IMAGE_TAG:-latest}
    command: celery -A app.workers.celery_app worker -l info -Q scraping,enrichment,ai,outreach,inbox,marketing,default
      -c 4
    environment:
    - DATABASE_URL=postgresql+asyncpg://outbound:outbound@db:5432/outbound_os
    - DATABASE_URL_SYNC=postgresql://outbound:outbound@db:5432/outbound_os
    - REDIS_URL=redis://redis:6379/0
    - CELERY_BROKER_URL=redis://redis:6379/0
    - CELERY_RESULT_BACKEND=redis://redis:6379/1
    - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
    - S3_ENDPOINT_URL=http://minio:9000
    - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minio}
    - S3_SECRET_KEY=${S3_SECRET_KEY:-minio123}
    - S3_BUCKET=${S3_BUCKET:-outbound-os}
    - DEBUG=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
  scheduler:
    profiles:
    - prod
    image: ${BACKEND_IMAGE:-outbound-backend}:${IMAGE_TAG:-latest}
    command: celery -A app.workers.celery_app beat -l info
    environment:
    - DATABASE_URL=postgresql+asyncpg://outbound:outbound@db:5432/outbound_os
    - DATABASE_URL_SYNC=postgresql://outbound:outbound@db:5432/outbound_os
    - REDIS_URL=redis://redis:6379/0
    - CELERY_BROKER_URL=redis://redis:6379/0
    - CELERY_RESULT_BACKEND=redis://redis:6379/1
    - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
    - S3_ENDPOINT_URL=http://minio:9000
    - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minio}
    - S3_SECRET_KEY=${S3_SECRET_KEY:-minio123}
    - S3_BUCKET=${S3_BUCKET:-outbound-os}
    - DEBUG=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
  frontend:
    profiles:
    - prod
    image: ${FRONTEND_IMAGE:-outbound-frontend}:${IMAGE_TAG:-latest}
    ports:
    - 80:80
    depends_on:
    - api
  db:
    image: pgvector/pgvector:pg16
    ports:
    - 5432:5432
    environment:
    - POSTGRES_DB=outbound_os
    - POSTGRES_USER=outbound
    - POSTGRES_PASSWORD=outbound
    volumes:
    - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U outbound -d outbound_os
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports:
    - 6379:6379
    volumes:
    - redisdata:/data
  minio:
    image: minio/minio
    ports:
    - 9000:9000
    - 9001:9001
    environment:
    - MINIO_ROOT_USER=minio
    - MINIO_ROOT_PASSWORD=minio123
    volumes:
    - miniodata:/data
    command: server /data --console-address ":9001"
  evolution-api:
    build:
      context: ./evolution-api
      dockerfile: Dockerfile
    image: evolution-api-baileys-fix:latest
    ports:
    - 8080:8080
    environment:
    - SERVER_TYPE=http
    - SERVER_PORT=8080
    - DATABASE_ENABLED=true
    - DATABASE_PROVIDER=postgresql
    - DATABASE_CONNECTION_URI=postgresql://outbound:outbound@db:5432/evolution_api
    - DATABASE_PREFIX=evolution
    - REDIS_ENABLED=true
    - REDIS_URI=redis://redis:6379/0
    - REDIS_PREFIX=evolution
    - WEBHOOK_GLOBAL_ENABLED=true
    - WEBHOOK_GLOBAL_URL=http://api-dev:8000/api/v1/webhooks/whatsapp
    - WEBHOOK_EVENTS_MESSAGE_UPSERT=true
    - WEBHOOK_EVENTS_MESSAGE_UPDATE=true
    - WEBHOOK_EVENTS_SEND_MESSAGE=true
    - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
    - WEBHOOK_EVENTS_QR_CODE=true
    - AUTHENTICATION_TYPE=apikey
    - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-outbound-os-evolution-key}
    - LANGUAGE=en
    - LOG_LEVEL=DEBUG
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
    - evolution_store:/evolution-store
volumes:
  pgdata: null
  redisdata: null
  miniodata: null
  evolution_store: null
